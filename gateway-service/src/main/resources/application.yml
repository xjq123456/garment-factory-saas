server:
  port: 8080

spring:
  codec:
    max-in-memory-size: 10MB
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**
        - id: rbac-service
          uri: lb://rbac-service
          predicates:
            - Path=/rbac/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/inventory/**
        - id: production-service
          uri: lb://production-service
          predicates:
            - Path=/production/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payment/**
        - id: print-service
          uri: lb://print-service
          predicates:
            - Path=/print/**
        - id: marketing-service
          uri: lb://marketing-service
          predicates:
            - Path=/marketing/**
        - id: ecommerce-adapter
          uri: lb://ecommerce-adapter
          predicates:
            - Path=/ecommerce/**
        - id: live-service
          uri: lb://live-service
          predicates:
            - Path=/live/**
        - id: style-service
          uri: lb://style-service
          predicates:
            - Path=/style/**
        - id: device-service
          uri: lb://device-service
          predicates:
            - Path=/device/**
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/report/**
        - id: ai-advisor-service
          uri: lb://ai-advisor-service
          predicates:
            - Path=/ai-advisor/**
        - id: ai-selection-service
          uri: lb://ai-selection-service
          predicates:
            - Path=/ai-selection/**
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/search/**

gateway:
  audit:
    enabled: true
  cache-request-body:
    enabled: false
  cors:
    enabled: false
    allowed-origins: []

knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3
      excluded-services:
        - gateway-service
      oas3:
        url: /v3/api-docs?group=default

management:
  endpoints:
    web:
      exposure:
        include: '*'
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
